<!DOCTYPE html>
<html lang="te">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0">
<title>OneStop DriveIn - హాజరు & జీతం</title>
<link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiT25lU3RvcCBEcml2ZUluIEhSIiwic2hvcnRfbmFtZSI6IkhSIFRyYWNrZXIiLCJzdGFydF91cmwiOiIuIiwiZGlzcGxheSI6InN0YW5kYWxvbmUiLCJiYWNrZ3JvdW5kX2NvbG9yIjoiI0ZBRjZFRCIsInRoZW1lX2NvbG9yIjoiIzE2NDIzQyJ9">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Telugu:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --teal-900:#0F3630;
    --teal-800:#16423C;
    --teal-700:#1F5A50;
    --gold-500:#D9A227;
    --gold-600:#B9860F;
    --paper:#FAF6ED;
    --card:#FFFFFF;
    --ink:#2B2620;
    --ink-soft:#6B6255;
    --line:#E8E0CE;
    --present:#4C7A51;
    --half:#D9A227;
    --absent:#B84C3E;
    --danger:#B84C3E;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Noto Sans Telugu','Noto Sans',system-ui,-apple-system,sans-serif;
    -webkit-font-smoothing:antialiased;
    padding-bottom:78px;
    min-height:100vh;
  }
  h1,h2,h3,.display{font-family:'Poppins','Noto Sans Telugu',sans-serif;}

  header{
    background:var(--teal-800);
    color:#fff;
    padding:18px 18px 22px;
    position:sticky; top:0; z-index:30;
    box-shadow:0 4px 14px rgba(15,54,48,0.18);
  }
  header .brand{font-size:12px; letter-spacing:.14em; text-transform:uppercase; opacity:.72; font-weight:600;}
  header h1{font-size:20px; margin:2px 0 0; font-weight:700;}
  header .sub{font-size:13px; opacity:.78; margin-top:2px;}
  .sync-status{font-size:11px; margin-top:6px; opacity:.9; display:flex; align-items:center; gap:5px;}
  .sync-status::before{content:'●'; font-size:9px;}
  .sync-status.ok{color:#BFE8C4;}
  .sync-status.ok::before{color:#6FD17E;}
  .sync-status.bad{color:#F3CFC5;}
  .sync-status.bad::before{color:#E8836C;}

  .period-strip{
    display:flex; align-items:center; gap:8px;
    margin-top:14px; background:rgba(255,255,255,0.08);
    border-radius:12px; padding:8px 10px;
  }
  .period-strip button{
    background:rgba(255,255,255,0.14); border:none; color:#fff;
    width:32px; height:32px; border-radius:8px; font-size:16px;
    display:flex; align-items:center; justify-content:center;
  }
  .period-strip .period-label{flex:1; text-align:center; font-size:13.5px; font-weight:600;}
  .period-strip .period-label .range{display:block; font-size:11.5px; font-weight:400; opacity:.75; margin-top:1px;}

  .daydots{display:flex; gap:5px; margin-top:12px; overflow-x:auto; padding-bottom:2px;}
  .daydot{
    flex:0 0 auto; width:30px; text-align:center; font-size:10.5px;
    color:rgba(255,255,255,0.85);
  }
  .daydot .dow{opacity:.6; font-size:9.5px;}
  .daydot .num{
    width:26px; height:26px; margin:2px auto 0; border-radius:8px;
    display:flex; align-items:center; justify-content:center;
    background:rgba(255,255,255,0.10); font-weight:600;
  }
  .daydot.today .num{outline:2px solid var(--gold-500); outline-offset:1px;}
  .daydot.selected .num{background:var(--gold-500); color:var(--teal-900);}

  main{padding:16px; max-width:520px; margin:0 auto;}
  .card{
    background:var(--card); border-radius:16px; padding:14px 14px;
    box-shadow:0 1px 3px rgba(43,38,32,0.06); margin-bottom:12px;
    border:1px solid var(--line);
  }
  .worker-row{display:flex; align-items:center; gap:10px; padding:8px 2px;}
  .worker-row + .worker-row{border-top:1px solid var(--line);}
  .avatar{
    width:38px; height:38px; border-radius:50%; background:var(--teal-800); color:#fff;
    display:flex; align-items:center; justify-content:center; font-weight:700; font-size:14px; flex:0 0 auto;
  }
  .wname{font-weight:600; font-size:14.5px;}
  .wname .en{display:block; font-size:11px; color:var(--ink-soft); font-weight:400;}
  .status-btns{display:flex; gap:5px; margin-left:auto;}
  .sbtn{
    border:1.5px solid var(--line); background:#fff; color:var(--ink-soft);
    border-radius:9px; padding:7px 9px; font-size:12px; font-weight:600;
    min-width:44px;
  }
  .sbtn.p.active{background:var(--present); border-color:var(--present); color:#fff;}
  .sbtn.h.active{background:var(--half); border-color:var(--half); color:#fff;}
  .sbtn.a.active{background:var(--absent); border-color:var(--absent); color:#fff;}

  .section-title{font-size:13px; text-transform:uppercase; letter-spacing:.08em; color:var(--ink-soft); font-weight:700; margin:6px 2px 8px;}

  .salary-card .top{display:flex; align-items:center; gap:10px;}
  .salary-card .rate-input{
    margin-left:auto; text-align:right;
  }
  .rate-input input{
    width:92px; padding:6px 8px; border:1.5px solid var(--line); border-radius:8px;
    font-size:13px; text-align:right; font-family:inherit; color:var(--ink);
  }
  .rate-input label{display:block; font-size:10px; color:var(--ink-soft); margin-bottom:2px;}
  .breakdown{margin-top:10px; padding-top:10px; border-top:1px dashed var(--line); font-size:13px;}
  .breakdown .row{display:flex; justify-content:space-between; padding:3px 0; color:var(--ink-soft);}
  .breakdown .row.net{color:var(--ink); font-weight:700; font-size:15px; border-top:1px solid var(--line); margin-top:4px; padding-top:7px;}
  .breakdown .row.net .amt{color:var(--teal-800);}
  .pill{display:inline-block; padding:1px 7px; border-radius:20px; font-size:11px; font-weight:600; margin-left:6px;}
  .pill.present{background:#E5F0E4; color:var(--present);}
  .pill.half{background:#FBF0DA; color:var(--gold-600);}
  .pill.absent{background:#F6E2DD; color:var(--absent);}
  .absdates{font-size:11.5px; background:#FBECE8; border:1px solid #EBC9C0; border-radius:9px;
    padding:6px 9px; margin:4px 0 2px; line-height:1.55; color:#8A3B2A;}
  .absdates b{color:#7A2A1A;}
  .breakdown .row.warn{color:#B4472A;}
  .breakdown .row.warn span:last-child{font-weight:700;}
  .wtab-intro{font-size:12.5px; color:var(--ink); background:#FFF8EC; border:1px solid #F0E0C0;
    border-radius:10px; padding:9px 11px; margin-bottom:12px; line-height:1.6;}
  .wcount-grid{display:flex; flex-wrap:wrap; gap:7px; margin-bottom:14px;}
  .wcount-chip{display:flex; align-items:center; gap:6px; background:var(--card);
    border:1px solid var(--line); border-radius:22px; padding:4px 10px 4px 5px; font-size:12px;
    color:var(--ink); font-family:inherit; cursor:pointer;}
  .wcount-chip .avatar{width:24px; height:24px; font-size:12px;}
  .wcount-chip .n{font-weight:700; min-width:12px; text-align:center;}
  .wlog-item{display:flex; align-items:center; gap:10px; padding:9px 2px; border-bottom:1px solid var(--line);}
  .wlog-item:last-child{border-bottom:0;}
  .wlog-item .meta{flex:1; min-width:0;}
  .wlog-del{border:0; background:transparent; color:var(--absent); font-size:17px; padding:2px 8px; cursor:pointer;}
  .wn-hint{font-size:12px; color:var(--gold-600); background:#FFF8EC; border-radius:8px;
    padding:7px 9px; margin:-2px 0 10px; line-height:1.5;}

  .add-advance-btn{
    width:100%; padding:10px; margin-top:10px; border:1.5px dashed var(--gold-600);
    background:#FDF7E9; color:var(--gold-600); border-radius:10px; font-weight:700; font-size:13px;
  }
  .outstanding-note{
    margin-top:10px; padding:8px 10px; background:#FBEFEC; border-radius:8px;
    font-size:12.5px; color:var(--absent);
  }
  .deduct-btn{
    border-color:var(--present); background:#EFF7EF; color:var(--present); margin-top:8px;
  }
  .pay-btn{
    border:0; background:var(--present); color:#fff; margin-top:8px;
    width:100%; padding:11px; border-radius:10px; font-weight:700; font-size:13.5px;
  }
  .paid-banner{
    margin-top:10px; padding:9px 11px; background:#EAF6EC; border:1px solid #BFE3C6;
    border-radius:10px; font-size:12.5px; color:var(--present); display:flex;
    align-items:center; gap:8px; line-height:1.5;
  }
  .paid-banner .undo{
    margin-left:auto; background:none; border:0; color:var(--ink-soft);
    font-size:11.5px; text-decoration:underline; padding:2px 0; flex-shrink:0;
  }
  .salary-card.is-paid{opacity:.72;}
  .pill.paid{background:#EAF6EC; color:var(--present);}

  .adv-item{display:flex; align-items:center; gap:10px; padding:8px 2px;}
  .adv-item + .adv-item{border-top:1px solid var(--line);}
  .adv-item .meta{flex:1;}
  .adv-item .amt{font-weight:700; color:var(--absent);}
  .adv-item .del{background:none; border:none; color:var(--ink-soft); font-size:16px; padding:4px 8px;}
  .owe-item{display:flex; align-items:center; gap:10px; padding:8px 2px;}
  .owe-item + .owe-item{border-top:1px solid var(--line);}
  .owe-item .meta{flex:1; min-width:0;}
  .owe-item .bal{font-weight:700;}
  .owe-item .sub{font-size:10.5px; color:var(--ink-soft);}
  .owe-total{display:flex; justify-content:space-between; padding:9px 2px 2px; margin-top:4px;
    border-top:1.5px solid var(--line); font-weight:700; font-size:14px;}

  .empty{text-align:center; color:var(--ink-soft); font-size:13px; padding:22px 10px;}

  .summary-total{
    background:var(--teal-800); color:#fff; border-radius:16px; padding:16px;
    margin-bottom:14px;
  }
  .summary-total .label{font-size:12px; opacity:.75; text-transform:uppercase; letter-spacing:.08em;}
  .summary-total .val{font-size:26px; font-weight:700; font-family:'Poppins',sans-serif; margin-top:2px;}
  .summary-total .sub-row{display:flex; justify-content:space-between; margin-top:12px; padding-top:12px; border-top:1px solid rgba(255,255,255,0.16); font-size:13px;}
  .summary-total .sub-row div span{display:block; font-size:15px; font-weight:700; margin-top:1px;}

  nav.tabbar{
    position:fixed; bottom:0; left:0; right:0; background:#fff;
    border-top:1px solid var(--line); display:flex; z-index:30;
    padding-bottom:env(safe-area-inset-bottom);
  }
  nav.tabbar button{
    flex:1; border:none; background:none; padding:10px 4px 8px; font-family:inherit;
    color:var(--ink-soft); font-size:11px; font-weight:600; display:flex; flex-direction:column; align-items:center; gap:3px;
  }
  nav.tabbar button .ic{font-size:19px;}
  nav.tabbar button.active{color:var(--teal-800);}
  nav.tabbar button.active .ic{filter: drop-shadow(0 0 0 var(--teal-800));}

  .modal-bg{
    position:fixed; inset:0; background:rgba(15,54,48,0.45); z-index:50;
    display:flex; align-items:flex-end; justify-content:center;
  }
  .modal{
    background:#fff; border-radius:18px 18px 0 0; padding:20px; width:100%; max-width:520px;
    animation:slideup .18s ease-out;
  }
  @keyframes slideup{from{transform:translateY(20px); opacity:0;} to{transform:translateY(0); opacity:1;}}
  .modal h3{margin:0 0 14px; font-size:16px;}
  .field{margin-bottom:12px;}
  .field label{display:block; font-size:12px; color:var(--ink-soft); margin-bottom:4px; font-weight:600;}
  .field select, .field input{
    width:100%; padding:10px 11px; border:1.5px solid var(--line); border-radius:10px;
    font-size:14px; font-family:inherit; color:var(--ink);
  }
  .modal-actions{display:flex; gap:8px; margin-top:16px;}
  .btn{flex:1; padding:12px; border-radius:10px; border:none; font-weight:700; font-size:14px; font-family:inherit;}
  .btn.primary{background:var(--teal-800); color:#fff;}
  .btn.ghost{background:var(--paper); color:var(--ink-soft); border:1.5px solid var(--line);}

  .loading{padding:40px; text-align:center; color:var(--ink-soft);}

  /* ---- Laxman container ledger ---- */
  .lx-row{display:flex; align-items:center; gap:10px; padding:8px 2px;}
  .lx-row + .lx-row{border-top:1px solid var(--line);}
  .lx-row .lbl{flex:1; font-size:13.5px; font-weight:600; min-width:0;}
  .lx-row .lbl span{display:block; font-size:10.5px; color:var(--ink-soft); font-weight:400;}
  .lx-row input{
    width:82px; padding:7px 8px; border:1.5px solid var(--line); border-radius:8px;
    font-size:14px; text-align:right; font-family:inherit; color:var(--ink); flex:0 0 auto;
  }
  .lx-row .unit{font-size:11px; color:var(--ink-soft); width:44px; flex:0 0 auto;}
  .lx-sub{font-size:12px; color:var(--ink-soft); background:#FBF7EE; border-radius:8px;
    padding:7px 9px; margin:8px 0 2px; line-height:1.6;}
  .lx-sub b{color:var(--ink);}
  .lx-cardhead{display:flex; align-items:baseline; gap:8px; margin-bottom:8px;}
  .lx-cardhead h3{margin:0; font-size:14.5px;}
  .lx-cardhead .tag{font-size:10px; letter-spacing:.06em; text-transform:uppercase;
    font-weight:700; padding:2px 7px; border-radius:20px;}
  .tag.biweekly{background:#E5F0E4; color:var(--present);}
  .tag.monthly{background:#FBF0DA; color:var(--gold-600);}
  .lx-tot{display:flex; justify-content:space-between; padding:8px 2px 2px; margin-top:6px;
    border-top:1.5px solid var(--line); font-weight:700; font-size:14px;}
  .lx-tot .we{color:var(--absent);}
  .lx-tot .lx{color:var(--present);}
  .lx-row b.we{color:var(--absent); font-size:14px;}
  .lx-row b.lx{color:var(--present); font-size:14px;}
  .settle{background:var(--teal-800); color:#fff; border-radius:16px; padding:16px; margin-bottom:12px;}
  .settle .label{font-size:11px; opacity:.75; text-transform:uppercase; letter-spacing:.08em;}
  .settle .val{font-size:26px; font-weight:700; font-family:'Poppins',sans-serif; margin-top:3px; line-height:1.2;}
  .settle .val small{display:block; font-size:12px; font-weight:400; opacity:.8; margin-top:3px; font-family:inherit;}
  .settle .split{display:flex; justify-content:space-between; gap:10px; margin-top:13px; padding-top:13px;
    border-top:1px solid rgba(255,255,255,0.16); font-size:12px;}
  .settle .split div{opacity:.8;}
  .settle .split div span{display:block; font-size:15.5px; font-weight:700; margin-top:2px; opacity:1;}
  .lx-note{font-size:12.5px; color:var(--ink); background:#FFF8EC; border:1px solid #F0E0C0;
    border-radius:10px; padding:9px 11px; margin-bottom:12px; line-height:1.6;}
</style>
</head>
<body>

<header>
  <div class="brand">OneStop DriveIn</div>
  <h1 id="headerTitle">సిబ్బంది హాజరు & జీతం</h1>
  <div class="sub" id="headerSub">Staff Attendance &amp; Biweekly Salary</div>
  <div class="sync-status" id="syncStatus">Connecting…</div>

  <div class="period-strip" id="periodStripAttendance">
    <button id="prevPeriod">‹</button>
    <div class="period-label">
      <span id="periodLabel">–</span>
      <span class="range" id="periodRange">–</span>
    </div>
    <button id="nextPeriod">›</button>
  </div>

  <div class="daydots" id="dayDots"></div>
</header>

<main id="mainArea">
  <div class="loading">లోడ్ అవుతోంది... loading</div>
</main>

<nav class="tabbar">
  <button data-tab="attendance" class="active"><span class="ic">📋</span>హాజరు</button>
  <button data-tab="salary"><span class="ic">💰</span>జీతం</button>
  <button data-tab="summary"><span class="ic">📊</span>సారాంశం</button>
  <button data-tab="laxman"><span class="ic">🫓</span>లక్ష్మణ్</button>
  <button data-tab="warnings"><span class="ic">⚠️</span>హెచ్చరికలు</button>
  <button data-tab="workers"><span class="ic">👥</span>సిబ్బంది</button>
</nav>

<script>
const STORAGE_KEY = 'onestop-hr-v1';
const TE_DOW = ['ఆది','సోమ','మంగళ','బుధ','గురు','శుక్ర','శని'];

// Every worker carries a FIXED dayRate — one day's pay, never derived from month length.
//  • biweekly staff are PAID on it (month total = dayRate × 28/30/31).
//  • monthly staff have a FIXED monthly salary, and dayRate is what one absent day costs them.
const DEFAULT_WORKERS = [
  {id:'veerababu',   name:'Veerababu',   te:'వీరబాబు',    role:'Chef',                       dayRate:1200, payFreq:'biweekly'},
  {id:'raju',        name:'Raju',        te:'రాజు',       role:'Assistant Chef',             dayRate:900,  payFreq:'biweekly'},
  {id:'triveni',     name:'Triveni',     te:'త్రివేణి',    role:'Manager',                    monthly:12000, dayRate:400, payFreq:'monthly'},
  {id:'laxman',      name:'Laxman',      te:'లక్ష్మణ్',    role:'Convention Hall Incharge',   monthly:15000, dayRate:500, payFreq:'monthly'},
  {id:'venkatesh',   name:'Venkatesh',   te:'వెంకటేష్',   role:'Cleaner & Lodge Supervisor', dayRate:600,  payFreq:'biweekly'},
  {id:'krishnavedi', name:'Krishnaveni', te:'కృష్ణవేణి',  role:'Cleaner',                    dayRate:400,  payFreq:'biweekly'},
  {id:'manasa',      name:'Maanasa',     te:'మానసా',     role:'Cleaner',                    monthly:12000, dayRate:400, payFreq:'monthly'},
  {id:'pachayya',    name:'Ponnaya',     te:'పొన్నయ్య',   role:'Cleaner',                    monthly:12000, dayRate:400, payFreq:'monthly'},
];

// migrate any previously-saved workers (from before roles existed, or before salary
// switched from a biweekly figure to a monthly figure) to the new shape
function migrateWorkers(list){
  const byId = {};
  DEFAULT_WORKERS.forEach(w=> byId[w.id]=w);
  list.forEach(w=>{
    if(!w.role){
      if(byId[w.id]){
        w.role = byId[w.id].role;
        w.name = byId[w.id].name;
        w.te = byId[w.id].te;
      } else {
        w.role = '';
      }
    }
    if(!w.payFreq){
      w.payFreq = byId[w.id] ? byId[w.id].payFreq : 'biweekly';
    }
    // Snapshot the legacy figures BEFORE any deletion — the dayRate fallback below needs them.
    // Very old records only stored a biweekly (half-month) figure.
    const legacyMonthly = w.monthly!=null ? w.monthly : (w.biweekly ? w.biweekly*2 : 0);
    // every worker now carries a fixed dayRate (paid on it if biweekly, deducted at it if monthly).
    // Old monthly figures were always day-rate × 30, so ÷30 recovers the rate exactly.
    if(!w.dayRate){
      w.dayRate = (byId[w.id] && byId[w.id].dayRate)
        ? byId[w.id].dayRate
        : Math.round(legacyMonthly/30);
    }
    // Only monthly staff need a monthly figure; biweekly staff are driven purely by dayRate.
    if(w.payFreq==='monthly') w.monthly = legacyMonthly;
    else delete w.monthly;
    delete w.biweekly;
  });
  DEFAULT_WORKERS.forEach(dw=>{
    if(!list.find(w=>w.id===dw.id)) list.push(Object.assign({}, dw));
  });
  return list;
}

let state = {
  workers: [],
  attendance: {},   // {workerId: {'YYYY-MM-DD': 'P'|'H'|'A'}}
  advances: [],      // [{id, workerId, date, amount, note}]
  warnings: [],      // [{id, workerId, date, reason, note, level, deduct}]
  payments: {},      // {'workerId|2026-7-1': {date:'YYYY-MM-DD', amount, note, at}}  half = 1|2|'M'
  laxman: {          // container ledger — bread biweekly, everything else monthly
    periods: {},     // {'2026-7-1': {roti, naan, rotiPrice, naanPrice, paid:{date,amount,note}}}
    months: {}       // {'2026-7': {items:{...}, watchman, fee, paid:{date,amount,note}}}
  },
  seedVersion: 0
};

// Bread: we sell it, we keep half the sale value, Laxman gets the other half.
const LX_ROTI_PRICE = 30;
const LX_NAAN_PRICE = 40;
// Cleaning consumables: we buy them, Laxman reimburses half the total bill.
const LX_ITEMS = [
  {id:'floor',    te:'ఫ్లోర్ క్లీనర్',    en:'Floor cleaner'},
  {id:'bath',     te:'బాత్రూమ్ క్లీనర్',  en:'Bathroom cleaner'},
  {id:'phenol',   te:'ఫినాయిల్',        en:'Phenol'},
  {id:'acid',     te:'యాసిడ్',          en:'Acid'},
  {id:'handwash', te:'హ్యాండ్ వాష్',     en:'Hand wash'},
  {id:'washliq',  te:'వాషింగ్ లిక్విడ్',  en:'Washing liquid'}
];
const LX_CLEANING_FEE = 1000;   // flat monthly cleaning charge Laxman pays us

function lxPeriodKey(parts){ return parts.y+'-'+parts.m+'-'+parts.half; }
function lxMonthKey(parts){ return parts.y+'-'+parts.m; }
function lxPeriod(parts){
  if(!state.laxman) state.laxman = {periods:{}, months:{}};
  if(!state.laxman.periods) state.laxman.periods = {};
  const k = lxPeriodKey(parts);
  if(!state.laxman.periods[k]){
    state.laxman.periods[k] = {roti:0, naan:0, rotiPrice:LX_ROTI_PRICE, naanPrice:LX_NAAN_PRICE, paid:null};
  }
  const p = state.laxman.periods[k];
  if(p.rotiPrice==null) p.rotiPrice = LX_ROTI_PRICE;
  if(p.naanPrice==null) p.naanPrice = LX_NAAN_PRICE;
  return p;
}
function lxMonth(parts){
  if(!state.laxman) state.laxman = {periods:{}, months:{}};
  if(!state.laxman.months) state.laxman.months = {};
  const k = lxMonthKey(parts);
  if(!state.laxman.months[k]){
    const items = {};
    LX_ITEMS.forEach(it=> items[it.id] = 0);
    state.laxman.months[k] = {items, watchman:0, fee:LX_CLEANING_FEE, paid:null};
  }
  const m = state.laxman.months[k];
  if(!m.items) m.items = {};
  LX_ITEMS.forEach(it=>{ if(m.items[it.id]==null) m.items[it.id] = 0; });
  if(m.fee==null) m.fee = LX_CLEANING_FEE;
  if(m.watchman==null) m.watchman = 0;
  return m;
}
// What one biweekly period's bread is worth. We collect the full sale, so we owe Laxman his half.
function lxBreadCalc(parts){
  const p = lxPeriod(parts);
  const rotiSale = (Number(p.roti)||0) * (Number(p.rotiPrice)||0);
  const naanSale = (Number(p.naan)||0) * (Number(p.naanPrice)||0);
  const sale = rotiSale + naanSale;
  return {p, rotiSale, naanSale, sale, ourShare: sale/2, weOwe: sale/2};
}
// Everything Laxman owes us, all of it monthly: half the cleaning bill, half the
// watchman's salary, plus the flat ₹1,000 cleaning charge.
function lxMonthCalc(parts){
  const m = lxMonth(parts);
  const itemsTotal = LX_ITEMS.reduce((s,it)=> s + (Number(m.items[it.id])||0), 0);
  const watchman = Number(m.watchman)||0;
  const fee = Number(m.fee)||0;
  return {m, itemsTotal, itemsHalf: itemsTotal/2, watchman, watchmanHalf: watchman/2,
          fee, lxOwes: itemsTotal/2 + watchman/2 + fee};
}
// Full-month settlement: both halves of bread against the month's dues.
function lxSettlement(parts){
  const h1 = lxBreadCalc({y:parts.y, m:parts.m, half:1});
  const h2 = lxBreadCalc({y:parts.y, m:parts.m, half:2});
  const weOwe = h1.weOwe + h2.weOwe;
  const mc = lxMonthCalc(parts);
  return {h1, h2, weOwe, lxOwes: mc.lxOwes, mc, net: mc.lxOwes - weOwe};
}

function todayStr(){

}
function pad(n){return n<10?'0'+n:''+n;}
function addDays(dateStr, n){
  const d = new Date(dateStr+'T00:00:00');
  d.setDate(d.getDate()+n);
  return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());

// ---- period math ----
function todayParts(){
  const d = new Date();
  return {y:d.getFullYear(), m:d.getMonth()+1, half: d.getDate()<=15 ? 1 : 2};
}
function stepPeriod(parts, steps){
  let {y,m,half} = parts;
  while(steps>0){
    if(half===1){ half=2; } else { half=1; m+=1; if(m>12){ m=1; y+=1; } }
    steps--;
  }
  while(steps<0){
    if(half===2){ half=1; } else { half=2; m-=1; if(m<1){ m=12; y-=1; } }
    steps++;
  }
  return {y,m,half};
}
function currentPeriodParts(){
  return stepPeriod(todayParts(), periodOffset);
}
function partsFromDate(dateStr){
  const p = (dateStr||todayStr()).split('-').map(Number);
  return {y:p[0], m:p[1], half: p[2]<=15 ? 1 : 2};
}
const FIXED_MONTH_DAYS = 30; // (legacy) kept for reference; salary math below now uses real month length
// Actual number of calendar days in this period's month: 28, 29 (leap Feb), 30 or 31.
function daysInMonth(parts){ return new Date(parts.y, parts.m, 0).getDate(); }
// Central salary math shared by the Salary, Summary and History views so they never drift.
//  • Everyone has a FIXED dayRate. It never changes with month length (28/29/30/31).
//  • biweekly staff are PAID on it: month total = dayRate × days in month.
//    ₹1200/day = ₹37,200 in a 31-day month, ₹36,000 in 30, ₹33,600 in 28.
//    Each half is worth dayRate × (calendar days in that half).
//  • monthly staff get a FIXED salary that does NOT change with month length, but every
//    absent day (and every 2nd-level warning) costs exactly dayRate — e.g. Triveni loses
//    ₹400 for one absence whether the month is 28 or 31 days long.
function daySalary(w, parts){
  if(w.dayRate) return w.dayRate;
  return (w.monthly||0)/daysInMonth(parts);   // legacy fallback only
}
function computeEarned(w, parts){
  const isMonthly = w.payFreq==='monthly';
  const stats = isMonthly ? combinedMonthStats(w.id, parts) : periodStats(w.id, parts);
  const missedDays = stats.absent + stats.half*0.5;
  const dim = daysInMonth(parts);                    // 28 / 29 / 30 / 31
  const penaltyRate = daySalary(w, parts);           // one day's pay, used for discipline deductions
  const warns = warningsForScope(w, parts);
  const warnDeductDays = warns.filter(x=>x.deduct).length;
  const warningDeduction = penaltyRate*warnDeductDays;
  if(isMonthly){
    const full = w.monthly||0;
    const deduction = penaltyRate*missedDays;   // fixed salary, but absent days are deducted
    const earned = full - deduction - warningDeduction;
    return {isMonthly:true, stats, missedDays, dim, daysThisPeriod:dim, dailyRate:penaltyRate,
            fullPeriodAmount:full, monthTotal:full, deduction, penaltyRate, warns, warnDeductDays,
            warningDeduction, earned};
  }
  const dailyRate = penaltyRate;                     // fixed ₹/day — does not shrink in a 31-day month
  const daysThisPeriod = periodDates(parts).length;  // 15 for 1st half, dim-15 for 2nd half
  const fullPeriodAmount = dailyRate*daysThisPeriod;
  const monthTotal = dailyRate*dim;                  // what the whole month is worth at this rate
  const deduction = dailyRate*missedDays;
  return {isMonthly:false, stats, missedDays, dim, daysThisPeriod, dailyRate,
          fullPeriodAmount, monthTotal, deduction, penaltyRate, warns, warnDeductDays,
          warningDeduction, earned:fullPeriodAmount-deduction-warningDeduction};
}
// ---- salary paid tracking ----
// Monthly staff are paid once for the whole month, so their key ignores the half.
// Biweekly staff get one key per half, matching how they're actually paid.
function paymentKey(w, parts){
  const scope = w.payFreq==='monthly' ? 'M' : parts.half;
  return w.id+'|'+parts.y+'-'+parts.m+'-'+scope;
}
function getPayment(w, parts){
  return (state.payments||{})[paymentKey(w, parts)] || null;
}
function setPayment(w, parts, rec){
  if(!state.payments) state.payments = {};
  state.payments[paymentKey(w, parts)] = rec;
}
function clearPayment(w, parts){
  if(state.payments) delete state.payments[paymentKey(w, parts)];
}

function monthHalves(parts){
  return [{y:parts.y,m:parts.m,half:1}, {y:parts.y,m:parts.m,half:2}];
}
function combinedMonthStats(workerId, parts){
  let present=0, half=0, absent=0;
  monthHalves(parts).forEach(p=>{
    const s = periodStats(workerId, p);
    present+=s.present; half+=s.half; absent+=s.absent;
  });
  return {present, half, absent};
}
function combinedMonthAdvances(workerId, parts){
  const mm = pad(parts.m);
  const lastDay = new Date(parts.y, parts.m, 0).getDate();
  const start = parts.y+'-'+mm+'-01';
  const end = parts.y+'-'+mm+'-'+pad(lastDay);
  return state.advances.filter(a=> a.workerId===workerId && a.date>=start && a.date<=end);
}
function periodBounds(parts){
  const mm = pad(parts.m);
  if(parts.half===1){
    return { start: parts.y+'-'+mm+'-01', end: parts.y+'-'+mm+'-15' };
  }
  const lastDay = new Date(parts.y, parts.m, 0).getDate();
  return { start: parts.y+'-'+mm+'-16', end: parts.y+'-'+mm+'-'+pad(lastDay) };
}
function periodDates(parts){
  const b = periodBounds(parts);
  const arr = [];
  let d = b.start;
  while(d <= b.end){ arr.push(d); d = addDays(d,1); }
  return arr;
}
function periodTopLabel(parts){
  const b = periodBounds(parts);
  return parseInt(b.start.split('-')[2],10) + '\u2013' + parseInt(b.end.split('-')[2],10);
}
function periodBottomLabel(parts){
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return months[parts.m-1] + ' ' + parts.y;
}

const FIREBASE_URL = 'https://attendance-and-salary-tr-20681-default-rtdb.asia-southeast1.firebasedatabase.app';
const FIREBASE_PATH = 'onestop-hr-data';

function withTimeout(promise, ms){
  return Promise.race([
    promise,
    new Promise((_,reject)=> setTimeout(()=>reject(new Error('timeout')), ms))
  ]);
}
async function firebaseGet(){
  const res = await withTimeout(fetch(FIREBASE_URL+'/'+FIREBASE_PATH+'.json'), 5000);
  if(!res.ok) throw new Error('firebase get failed: '+res.status);
  return await res.json(); // null if nothing saved yet
}
async function firebaseSet(data){
  const res = await withTimeout(fetch(FIREBASE_URL+'/'+FIREBASE_PATH+'.json', {
    method:'PUT',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(data)
  }), 5000);
  if(!res.ok) throw new Error('firebase set failed: '+res.status);
  return true;
}

// ---- storage (local cache fallback for when Firebase is unreachable) ----
async function storageGet(key){
  if(typeof window.storage !== 'undefined' && window.storage){
    try{
      const r = await withTimeout(window.storage.get(key, false), 4000);
      if(r) return r;
    }catch(e){ /* fall through to localStorage */ }
  }
  try{
    const v = localStorage.getItem(key);
    return v ? {key, value:v} : null;
  }catch(e){ return null; }
}
async function storageSet(key, value){
  let ok = false;
  if(typeof window.storage !== 'undefined' && window.storage){
    try{
      const r = await withTimeout(window.storage.set(key, value, false), 4000);
      if(r) ok = true;
    }catch(e){ /* fall through */ }
  }
  try{ localStorage.setItem(key, value); ok = true; }catch(e){ /* ignore */ }
  return ok;
}

  const el = document.getElementById('syncStatus');

  const secs = Math.floor((Date.now()-lastSyncTime)/1000);
  const when = secs<5 ? 'just now' : secs<60 ? secs+'s ago' : Math.floor(secs/60)+'m ago';
  el.textContent = (lastSyncOk ? 'Synced ' : 'Offline \u2013 saved on this phone ') + when;
  el.className = 'sync-status ' + (lastSyncOk ? 'ok' : 'bad');
}

async function loadState(){
  let remote = null;

    markSynced(true);
  }catch(e){
    console.error('firebase load failed, using local cache', e);
    markSynced(false);
  }

  if(remote){
    state = remote;
  } else {
    let loaded = null;
    try{
      const res = await storageGet(STORAGE_KEY);
      if(res && res.value) loaded = JSON.parse(res.value);
    }catch(e){ loaded = null; }
    state = loaded || {workers: DEFAULT_WORKERS.map(w=>Object.assign({},w)), attendance:{}, advances:[], warnings:[], payments:{}, seedVersion:0};
  }
  normalizeState();
  await saveState();

  }catch(e){
    console.error('firebase save failed (will still keep local copy)', e);
    markSynced(false);
  }
  try{
    await storageSet(STORAGE_KEY, JSON.stringify(state));
  }catch(e){
    console.error('local cache save failed', e);
  }
}

// poll for changes made on other devices (e.g. manager's phone) every few seconds
function startSync(){
  setInterval(async ()=>{
    const active = document.activeElement;
    const isEditing = active && ['INPUT','TEXTAREA','SELECT'].includes(active.tagName);
    if(isEditing) return; // don't yank the screen while someone's typing
    if(typeof lxSaveTimer !== 'undefined' && lxSaveTimer) return; // a debounced save is still pending
    try{
      const remote = await firebaseGet();
      markSynced(true);
      if(remote && remote.lastUpdated && (!state.lastUpdated || remote.lastUpdated > state.lastUpdated)){
        state = remote;
        normalizeState();
        render();
      }
    }catch(e){ markSynced(false); /* offline or unreachable, just skip this tick */ }
  }, 5000);
}

function periodStats(workerId, parts){
  const dates = periodDates(parts);
  let present=0, half=0, absent=0;
  dates.forEach(d=>{
    const s = statusFor(workerId, d);
    if(s==='P') present++;
    else if(s==='H') half++;
    else if(s==='A') absent++;
  });
  return {present, half, absent, marked: present+half+absent};
}
function advancesInPeriod(workerId, parts){
  const b = periodBounds(parts);
  return state.advances.filter(a=> a.workerId===workerId && a.date>=b.start && a.date<=b.end);
}
function outstandingBalance(workerId){
  return state.advances
    .filter(a=> a.workerId===workerId)
    .reduce((sum,a)=> sum + (a.type==='repaid' ? -Number(a.amount) : Number(a.amount)), 0);
}
// ---- discipline warnings (dress code / gloves etc.) ----
function warningsInPeriod(workerId, parts){
  const b = periodBounds(parts);
  return (state.warnings||[]).filter(x=> x.workerId===workerId && x.date>=b.start && x.date<=b.end);
}
function combinedMonthWarnings(workerId, parts){
  const mm = pad(parts.m);
  const lastDay = new Date(parts.y, parts.m, 0).getDate();
  const start = parts.y+'-'+mm+'-01';
  const end = parts.y+'-'+mm+'-'+pad(lastDay);
  return (state.warnings||[]).filter(x=> x.workerId===workerId && x.date>=start && x.date<=end);
}
function warningsForScope(w, parts){
  return w.payFreq==='monthly' ? combinedMonthWarnings(w.id, parts) : warningsInPeriod(w.id, parts);
}
const REASON_LABELS = {
  dress:  'డ్రెస్ కోడ్ (Dress code)',
  gloves: 'గ్లౌజ్ లేవు (No gloves)',
  other:  'ఇతర (Other)'
};
// dates in this card's scope where the worker was Absent (A) or Half-day (H)
function absencesForScope(w, parts){
  const dates = (w.payFreq==='monthly')
    ? monthHalves(parts).reduce((acc,p)=> acc.concat(periodDates(p)), [])
    : periodDates(parts);
  const abs=[], half=[];
  dates.forEach(d=>{ const s=statusFor(w.id,d); if(s==='A') abs.push(d); else if(s==='H') half.push(d); });
  return {abs, half};
}

function renderSummary(){
  const main = document.getElementById('mainArea');
  const parts = currentPeriodParts();
  let totalNet=0, totalAdv=0, totalPresent=0, paidTotal=0, pendingTotal=0, paidCount=0;
  state.workers.forEach(w=>{
    const {isMonthly, stats, earned} = computeEarned(w, parts);
    const advTotal = (isMonthly ? combinedMonthAdvances(w.id, parts) : advancesInPeriod(w.id, parts)).reduce((s,a)=>s+Number(a.amount),0);
    const net = earned-advTotal;
    totalNet += net;
    totalAdv += advTotal;
    totalPresent += stats.present;
    const p = getPayment(w, parts);
    if(p){ paidTotal += Number(p.amount)||0; paidCount++; }
    else { pendingTotal += net; }
  });
  const payStatus = state.workers.map(w=>({w, p:getPayment(w, parts)}));
  const paySection = `
    <div class="section-title">జీతం చెల్లింపు స్థితి (Payment status)</div>
    <div class="card">
      ${payStatus.map(({w,p})=>`
        <div class="owe-item">
          <div class="avatar">${w.name.charAt(0)}</div>
          <div class="meta"><div class="wname">${w.te}<span class="en">${w.name}${p?' · '+fmtShort(p.date)+(p.note?' · '+p.note:''):' · ఇంకా చెల్లించలేదు (not paid yet)'}</span></div></div>
          <div class="bal" style="color:${p?'var(--present)':'var(--absent)'}">${p?'✓ '+fmtRupee(p.amount):'—'}</div>
        </div>`).join('')}
      <div class="owe-total"><span>చెల్లించినది (${paidCount}/${state.workers.length})</span><span>${fmtRupee(paidTotal)}</span></div>
      <div class="owe-total"><span>ఇంకా చెల్లించవలసినది (pending)</span><span>${fmtRupee(pendingTotal)}</span></div>
    </div>`;

  const allAdvances = [...state.advances].sort((a,b)=> b.date.localeCompare(a.date));

  // outstanding = all-time given minus repaid, per worker (matches the salary card figure)
  const owed = state.workers.map(w=>{
    const list = state.advances.filter(a=> a.workerId===w.id);
    const given  = list.filter(a=>a.type!=='repaid').reduce((s,a)=>s+Number(a.amount),0);
    const repaid = list.filter(a=>a.type==='repaid').reduce((s,a)=>s+Number(a.amount),0);
    return {w, given, repaid, bal: given-repaid};
  }).filter(o=> Math.round(o.bal)!==0).sort((a,b)=> b.bal-a.bal);
  const owedTotal = owed.reduce((s,o)=>s+o.bal,0);
  const owedSection = `
    <div class="section-title">బకాయి అడ్వాన్స్ (Outstanding by worker)</div>
    <div class="card">
      ${owed.length===0 ? '<div class="empty">బకాయిలు లేవు (nothing outstanding)</div>' :
        owed.map(o=>`
        <div class="owe-item">
          <div class="avatar">${o.w.name.charAt(0)}</div>
          <div class="meta"><div class="wname">${o.w.te}<span class="en">${o.w.name} · ఇచ్చారు ${fmtRupee(o.given)} \u2212 తిరిగి ${fmtRupee(o.repaid)}</span></div></div>
          <div class="bal" style="color:${o.bal>=0?'var(--absent)':'var(--present)'}">${fmtRupee(o.bal)}</div>
        </div>`).join('') +
        `<div class="owe-total"><span>మొత్తం బకాయి (Total)</span><span>${fmtRupee(owedTotal)}</span></div>`
      }
    </div>`;

  main.innerHTML = `
    <div class="summary-total">
      <div class="label">${periodTopLabel(parts)} \u00b7 ${periodBottomLabel(parts)}</div>
      <div class="val">${fmtRupee(totalNet)}</div>
      <div class="sub-row">
        <div>ఇంకా చెల్లించవలసినది<span>${fmtRupee(pendingTotal)}</span></div>
        <div>ఈ పీరియడ్ కోత<span>${fmtRupee(totalAdv)}</span></div>
        <div>హాజరు రోజులు<span>${totalPresent}</span></div>
      </div>
    </div>
    ${paySection}
    ${owedSection}
    <div class="section-title">అడ్వాన్స్ చరిత్ర (Advance history)</div>
    <div class="card">
      ${allAdvances.length===0 ? '<div class="empty">ఇంకా అడ్వాన్స్ లు లేవు</div>' :
        allAdvances.map(a=>{
          const w = state.workers.find(x=>x.id===a.workerId);
          const isRepaid = a.type==='repaid';
          return `<div class="adv-item">
            <div class="avatar">${w?w.name.charAt(0):'?'}</div>
            <div class="meta">
              <div class="wname">${w?w.te:a.workerId}<span class="en">${fmtShort(a.date)} · ${isRepaid?'తిరిగి తీసుకున్నారు':'ఇచ్చారు'}${a.note?' · '+a.note:''}</span></div>
            </div>
            <div class="amt" style="${isRepaid?'color:var(--present);':''}">${isRepaid?'+':'-'}${fmtRupee(a.amount)}</div>
            <button class="del" data-id="${a.id}">✕</button>
          </div>`;
        }).join('')
      }
    </div>
  `;
  main.querySelectorAll('.del').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      state.advances = state.advances.filter(a=>a.id!==btn.dataset.id);
      saveState();
      render();
    });
  });
}

        <div>క్లీనింగ్ సగం<span id="lxS1">–</span></div>
        <div style="text-align:center">వాచ్‌మన్ సగం<span id="lxS2">–</span></div>
        <div style="text-align:right">ఛార్జ్<span id="lxS3">–</span></div>
      </div>
    </div>
    <div class="card" style="margin-top:-4px">
      ${m.paid ? `
      <div class="paid-banner" style="margin-top:0">
        <span>✓ <b>తీసుకున్నాము</b> ${fmtRupee(m.paid.amount)} · ${fmtShort(m.paid.date)}${m.paid.note?' · '+m.paid.note:''}</span>
        <button class="undo" id="lxUnpayM">తీసివేయి (undo)</button>
      </div>` : `
      <button class="pay-btn" style="margin-top:0" id="lxPayM">✓ లక్ష్మణ్ నుండి తీసుకున్నాము (Mark received)</button>`}
    </div>
    <div class="empty">వేరే పీరియడ్ చూడటానికి పైన ‹ › నొక్కండి<br>(‹ › switches the roti/naan period)</div>
  `;

  // recompute every figure from state without touching the inputs themselves
  function lxRefresh(){
    const b = lxBreadCalc(parts);
    const mc = lxMonthCalc(parts);
    const set = (id, txt)=>{ const el = main.querySelector('#'+id); if(el) el.textContent = txt; };
    set('lxRotiLine', (b.p.roti||0)+' × '+fmtRupee(b.p.rotiPrice||0)+' = '+fmtRupee(b.rotiSale));
    set('lxNaanLine', (b.p.naan||0)+' × '+fmtRupee(b.p.naanPrice||0)+' = '+fmtRupee(b.naanSale));
    set('lxSale', fmtRupee(b.sale));
    set('lxOurShare', fmtRupee(b.ourShare));
    set('lxRotiHalf', fmtRupee(b.rotiSale/2));
    set('lxNaanHalf', fmtRupee(b.naanSale/2));
    set('lxItemsTotal', fmtRupee(mc.itemsTotal));
    set('lxItemsHalf', fmtRupee(mc.itemsHalf));
    set('lxWatchHalf', fmtRupee(mc.watchmanHalf));
    set('lxFeeOut', fmtRupee(mc.fee));
    set('lxS1', fmtRupee(mc.itemsHalf));
    set('lxS2', fmtRupee(mc.watchmanHalf));
    set('lxS3', fmtRupee(mc.fee));
    const pe = main.querySelector('#lxNetPeriod');
    if(pe) pe.innerHTML = `${fmtRupee(b.weOwe)}<small>మనం లక్ష్మణ్‌కు ఇవ్వాలి · we owe Laxman</small>`;
    const me = main.querySelector('#lxNetMonth');
    if(me) me.innerHTML = `${fmtRupee(mc.lxOwes)}<small>లక్ష్మణ్ మనకు ఇవ్వాలి · Laxman owes us</small>`;
    const bp = main.querySelector('#lxPayP'); if(bp) bp.dataset.net = Math.round(b.weOwe);
    const bm = main.querySelector('#lxPayM'); if(bm) bm.dataset.net = Math.round(mc.lxOwes);
  }
  lxRefresh();

  // 'input' fires on every keystroke so the totals move as you type, and because the
  // DOM is never rebuilt the keyboard and cursor stay put.
  main.querySelectorAll('.lxP').forEach(inp=>{
    inp.addEventListener('focus', ()=> inp.select());
    inp.addEventListener('input', ()=>{
      lxPeriod(parts)[inp.dataset.f] = lxNum(inp.value);
      lxRefresh(); lxQueueSave();
    });
  });
  main.querySelectorAll('.lxI').forEach(inp=>{
    inp.addEventListener('focus', ()=> inp.select());
    inp.addEventListener('input', ()=>{
      lxMonth(parts).items[inp.dataset.i] = lxNum(inp.value);
      lxRefresh(); lxQueueSave();
    });
  });
  main.querySelectorAll('.lxM').forEach(inp=>{
    inp.addEventListener('focus', ()=> inp.select());
    inp.addEventListener('input', ()=>{
      lxMonth(parts)[inp.dataset.f] = lxNum(inp.value);
      lxRefresh(); lxQueueSave();
    });
  });

  const payP = main.querySelector('#lxPayP');
  if(payP) payP.addEventListener('click', ()=> openLxSettleModal(parts, 'period', Number(payP.dataset.net)||0));
  const payM = main.querySelector('#lxPayM');
  if(payM) payM.addEventListener('click', ()=> openLxSettleModal(parts, 'month', Number(payM.dataset.net)||0));
  const unP = main.querySelector('#lxUnpayP');
  if(unP) unP.addEventListener('click', ()=>{
    if(confirm('ఈ గుర్తును తీసివేయాలా?\nUndo this record?')){ lxPeriod(parts).paid = null; saveState(); render(); }
  });
  const unM = main.querySelector('#lxUnpayM');
  if(unM) unM.addEventListener('click', ()=>{
    if(confirm('ఈ గుర్తును తీసివేయాలా?\nUndo this record?')){ lxMonth(parts).paid = null; saveState(); render(); }
  });
}

// scope 'period' = the biweekly bread money we hand Laxman.
// scope 'month'  = the monthly cleaning + watchman + charge money he hands us.
function openLxSettleModal(parts, scope, suggested){
  const isPeriod = scope==='period';
  const scopeLabel = isPeriod
    ? periodTopLabel(parts)+' '+periodBottomLabel(parts)+' (బైవీక్లీ)'
    : periodBottomLabel(parts)+' (నెలవారీ)';
  const dir = isPeriod
    ? 'మనం లక్ష్మణ్‌కు ఇచ్చాము (we paid Laxman)'
    : 'లక్ష్మణ్ మనకు ఇచ్చారు (Laxman paid us)';
  const bg = document.createElement('div');
  bg.className='modal-bg';
  bg.innerHTML = `
    <div class="modal">
      <h3>${isPeriod ? '🫓 రొట్టె/నాన్ చెల్లింపు' : '🧾 నెలవారీ వసూలు'}</h3>
      <div class="wn-hint">${scopeLabel}<br>${dir}<br>లెక్క ప్రకారం: <b>${fmtRupee(suggested)}</b></div>
      <div class="field"><label>తేదీ (Date)</label><input type="date" id="lxDate" value="${todayStr()}"></div>
      <div class="field"><label>మొత్తం (Amount ₹)</label><input type="number" inputmode="numeric" id="lxAmt" value="${suggested}"></div>
      <div class="field"><label>నోట్ (Note, optional — cash / GPay)</label><input type="text" id="lxNote" placeholder=""></div>
      <div class="modal-actions">
        <button class="btn ghost" id="lxCancel">రద్దు</button>
        <button class="btn primary" id="lxSave">సేవ్</button>
      </div>
    </div>`;
  document.body.appendChild(bg);
  bg.querySelector('#lxCancel').addEventListener('click', ()=> bg.remove());
  bg.addEventListener('click', (e)=>{ if(e.target===bg) bg.remove(); });
  bg.querySelector('#lxSave').addEventListener('click', ()=>{
    const rec = {
      date: bg.querySelector('#lxDate').value || todayStr(),
      amount: Number(bg.querySelector('#lxAmt').value)||0,
      note: bg.querySelector('#lxNote').value.trim(),
      at: Date.now()
    };
    if(isPeriod) lxPeriod(parts).paid = rec;
    else lxMonth(parts).paid = rec;
    saveState();
    bg.remove();
    render();
  });
}

function renderWarnings(){
  const main = document.getElementById('mainArea');

    return {w, count:list.length, deducts:list.filter(x=>x.deduct).length};
  });
  const chips = perWorker.map(p=>`
    <button class="wcount-chip" data-w="${p.w.id}">
      <span class="avatar">${p.w.name.charAt(0)}</span>
      <span>${p.w.te}</span>
      <span class="n">${p.count}</span>
      ${p.deducts?`<span class="pill absent">${p.deducts} కోత</span>`:''}
    </button>`).join('');
  const allWarnings = [...(state.warnings||[])].sort((a,b)=> b.date.localeCompare(a.date));
  const log = allWarnings.length===0
    ? '<div class="empty">ఇంకా హెచ్చరికలు లేవు</div>'

          <div class="avatar">${w?w.name.charAt(0):'?'}</div>
          <div class="meta">
            <div class="wname">${w?w.te:x.workerId} ${lvlPill}<span class="en">${fmtShort(x.date)} · ${REASON_LABELS[x.reason]||x.reason}${x.note?' · '+x.note:''}</span></div>
          </div>
          <button class="wlog-del" data-id="${x.id}" title="తొలగించు">\u2715</button>
        </div>`;
      }).join('');
  main.innerHTML = `
    <div class="wtab-intro">
      <b>డ్రెస్ కోడ్ / గ్లౌజ్ హెచ్చరికలు.</b> మొదటిసారి \u2192 <b>హెచ్చరిక మాత్రమే</b> (కోత లేదు).
      రెండవసారి \u2192 <b>ఆ రోజు జీతం కోత</b> (1 రోజు జీతం). త్రివేణి ఇక్కడ లాగ్ చేయవచ్చు.
    </div>
    <button class="add-advance-btn" id="addWarnBtn">+ కొత్త హెచ్చరిక (Add warning)</button>
    <div class="section-title" style="margin-top:14px;">ఈ పీరియడ్ (${periodTopLabel(parts)} \u00b7 ${periodBottomLabel(parts)})</div>
    <div class="wcount-grid">${chips}</div>
    <div class="section-title">హెచ్చరికల చరిత్ర (Warning history)</div>
    <div class="card">${log}</div>`;
  main.querySelector('#addWarnBtn').addEventListener('click', ()=> openWarningModal());
  main.querySelectorAll('.wcount-chip').forEach(btn=> btn.addEventListener('click', ()=> openWarningModal(btn.dataset.w)));
  main.querySelectorAll('.wlog-del').forEach(btn=> btn.addEventListener('click', ()=>{
    if(confirm('ఈ హెచ్చరికను తొలగించాలా?')){
      state.warnings = (state.warnings||[]).filter(x=> x.id!==btn.dataset.id);
      saveState(); render();
    }
  }));
}

        </select>
      </div>
      <div class="field"><label id="newRateLabel">రోజు జీతం (Salary per day ₹)</label><input type="number" inputmode="numeric" id="newRate" value="500"></div>
      <div class="field" id="newMonthlyWrap" style="display:none">
        <label>నెలవారీ జీతం (Fixed monthly salary ₹)</label>
        <input type="number" inputmode="numeric" id="newMonthly" value="12000">
      </div>
      <div class="modal-actions">
        <button class="btn ghost" id="wCancel">రద్దు</button>
        <button class="btn primary" id="wSave">సేవ్</button>
      </div>
    </div>`;
  document.body.appendChild(bg);
  bg.querySelector('#newFreq').addEventListener('change', (e)=>{
    const monthly = e.target.value==='monthly';
    bg.querySelector('#newRateLabel').textContent = monthly
      ? 'రోజు జీతం (1 రోజు గైర్హాజరు కోత ₹)' : 'రోజు జీతం (Salary per day ₹)';
    bg.querySelector('#newMonthlyWrap').style.display = monthly ? '' : 'none';
  });
  bg.querySelector('#wCancel').addEventListener('click', ()=> bg.remove());
  bg.addEventListener('click', (e)=>{ if(e.target===bg) bg.remove(); });
  bg.querySelector('#wSave').addEventListener('click', ()=>{
    const en = bg.querySelector('#newEn').value.trim();
    const te = bg.querySelector('#newTe').value.trim() || en;
    const role = bg.querySelector('#newRole').value.trim();
    const rate = Number(bg.querySelector('#newRate').value)||0;
    if(!en){ alert('పేరు నమోదు చేయండి'); return; }
    const id = en.toLowerCase().replace(/[^a-z0-9]+/g,'-')+'-'+Date.now();
    const payFreq = bg.querySelector('#newFreq').value;
    const worker = {id, name:en, te, role, payFreq, dayRate:rate};
    if(payFreq==='monthly') worker.monthly = Number(bg.querySelector('#newMonthly').value)||0;
    state.workers.push(worker);
    saveState();
    bg.remove();
    render();
  });
}

// ---- nav ----
document.querySelectorAll('nav.tabbar button').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('nav.tabbar button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentTab = btn.dataset.tab;
    render();
  });
});
document.getElementById('prevPeriod').addEventListener('click', ()=>{ periodOffset--; render(); });
document.getElementById('nextPeriod').addEventListener('click', ()=>{ periodOffset++; render(); });

// ---- init ----
(async function init(){
  try{
    await withTimeout(loadState(), 6000);
  }catch(e){
    console.error('load failed, falling back to defaults', e);
    state = {workers: DEFAULT_WORKERS.map(w=>Object.assign({},w)), attendance:{}, advances:[], warnings:[], payments:{}, seedVersion:0};
    try{ applySeedData(); }catch(e2){}
  }
  try{
    render();
  }catch(e){
    console.error('render failed', e);
    document.getElementById('mainArea').innerHTML =
      '<div class="empty">Something went wrong loading the app.<br>Please close and reopen it.</div>';
  }
  startSync();
})();
</script>
</body>
</html>
